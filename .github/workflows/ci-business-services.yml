name: "CI · Business Services (Contratos / Propostas / Avaliações)"

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/services/contratos-service/**"
      - "backend/services/propostas-service/**"
      - "backend/services/avaliacoes-service/**"
      - "shared/**"
      - ".github/workflows/ci-business-services.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/services/contratos-service/**"
      - "backend/services/propostas-service/**"
      - "backend/services/avaliacoes-service/**"
      - "shared/**"
      - ".github/workflows/ci-business-services.yml"

concurrency:
  group: ci-business-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:

  contratos-ci:
    name: "Contratos Service — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/contratos-service

    steps:
      - name: "Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/services/contratos-service/package-lock.json

      - name: "Instalar dependências"
        run: npm ci

      - name: "Compilar TypeScript"
        run: npm run build

      - name: "Executar testes com cobertura"
        run: |
          npx jest \
            --ci \
            --forceExit \
            --coverage \
            --coverageReporters=lcov \
            --coverageReporters=text-summary
        env:
          DATABASE_URL: "postgresql://mock:mock@localhost:5432/contratos_db"
          RABBITMQ_URL: "amqp://mock:mock@localhost:5672"
          REDIS_URL: "redis://:mock@localhost:6379"
          PORT: "3002"

      - name: "Upload do relatório de cobertura"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-contratos
          path: backend/services/contratos-service/coverage/
          retention-days: 7

